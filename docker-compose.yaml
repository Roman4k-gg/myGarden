version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mygarden-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mygarden_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mygarden_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    volumes:
      - ./user-Service/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://user:password@postgres:5432/mygarden_db?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    container_name: mygarden-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mygarden-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mygarden-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api-gateway:
    build:
      context: .
      dockerfile: API-gateway/Dockerfile
    container_name: mygarden-api-gateway
    ports:
      - "3000:3000"
    environment:
      - USER_SERVICE_ADDR=user-service:50051
      - CATALOG_SERVICE_ADDR=catalog-service:50052
    depends_on:
      - user-service
      - catalog-service

  user-service:
    build:
      context: .
      dockerfile: user-Service/Dockerfile
    container_name: mygarden-user-service
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/mygarden_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  catalog-service:
    build:
      context: .
      dockerfile: catalog-Service/Dockerfile
    container_name: mygarden-catalog-service
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/mygarden_db?sslmode=disable
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKER=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: notification-Service/Dockerfile
    container_name: mygarden-notification-service
    environment:
      - KAFKA_BROKER=kafka:29092
    depends_on:
      kafka:
        condition: service_started

volumes:
  pgdata:
